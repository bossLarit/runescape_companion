name: "PROD: Build & Release Windows"

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+" # e.g. v1.2.0 (no suffix = prod)

permissions:
  contents: write

jobs:
  build-prod:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      - name: Flutter doctor
        run: flutter doctor -v

      - name: Get dependencies
        run: flutter pub get

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"          # e.g. v1.2.0
          $ver = $tag -replace '^v', ''             # 1.2.0
          $num = "${{ github.run_number }}"
          echo "BUILD_NAME=$ver"   >> $env:GITHUB_OUTPUT
          echo "BUILD_NUMBER=$num" >> $env:GITHUB_OUTPUT

      - name: Build Windows (prod)
        run: >-
          flutter build windows --release -t lib/main.dart
          --build-name=${{ steps.version.outputs.BUILD_NAME }}
          --build-number=${{ steps.version.outputs.BUILD_NUMBER }}

      - name: Create ZIP archive
        run: |
          Compress-Archive -Path "build\windows\x64\runner\Release\*" -DestinationPath "OSRS_Companion_Windows.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: OSRS_Companion_Windows.zip
          generate_release_notes: true
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
